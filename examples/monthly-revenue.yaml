# Example run spec — runs three queries against an OBSL deployment in
# single-model mode and emits a monthly-revenue markdown report.
#
# Usage:
#   uv run orionbelt-runner run examples/monthly-revenue.yaml

name: Monthly Revenue
description: >
  Top-line numbers for the monthly business review. Assumes the OBSL server
  is running in single-model mode (MODEL_FILE set) with QUERY_EXECUTE=true
  and DB credentials configured.

obsl:
  base_url: http://localhost:8080
  # model_id: omitted — single-model mode

queries:
  - name: total_revenue
    description: Headline revenue number
    dialect: postgres
    query:
      select:
        dimensions: []
        measures: [Total Revenue]

  - name: revenue_by_country
    description: Top 20 countries by revenue
    dialect: postgres
    query:
      select:
        dimensions: [Customer Country]
        measures: [Total Revenue]
      order_by:
        - field: Total Revenue
          direction: desc
      limit: 20

  - name: top_customers_raw
    description: Top customer order rows (raw mode)
    dialect: postgres
    query:
      select:
        fields:
          - Customers.Name
          - Customers.Country
          - Orders.Order ID
          - Orders.Amount
      order_by:
        - field: Orders.Amount
          direction: desc
      limit: 50

report:
  format: markdown
  output: reports/monthly-revenue-{date}.md
  title: "Monthly Revenue — {date}"
  intro: |
    Auto-generated by OrionBelt Runner.
    Run at {datetime}.
  sections:
    - heading: Total revenue
      query: total_revenue
      render: value

    - heading: Revenue by country
      description: Top 20 countries by revenue.
      query: revenue_by_country
      render: table

    - heading: Top customer orders
      description: Largest 50 individual orders.
      query: top_customers_raw
      render: table
